<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MacBook Neo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f7;
        }

        /* TOP BANNER */
        .top-banner {
            background: #eaeaea;
            padding: 10px 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-banner button {
            background: #0071e3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* HEADER */
        header {
            background: white;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }

        nav a:hover {
            color: #0071e3;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 10px;
            color: #111;
        }

        .hero p {
            font-size: 22px;
            color: #555;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            margin: 10px;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
        }

        .primary {
            background: #0071e3;
            color: white;
        }

        .primary:hover {
            background: #005bb5;
        }

        .outline {
            border: 2px solid #0071e3;
            color: #0071e3;
        }

        .outline:hover {
            background: #0071e3;
            color: white;
        }

        /* PRODUCT */
        .product {
            text-align: center;
            padding: 40px;
        }

        .product img {
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .product img:hover {
            transform: scale(1.05);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            color: #777;
        }
    </style>
</head>
<body>

<div class="top-banner">
    <span>
        Chọn quốc gia hoặc khu vực khác để xem nội dung dành riêng cho vị trí của bạn và mua sắm trực tuyến.
    </span>
    <div>
        <select>
            <option>Việt Nam</option>
        </select>
        <button>Tiếp Tục</button>
        <span style="margin-left:10px; cursor:pointer;">X</span>
    </div>
</div>

<header>
    <div>🍎</div>
    <nav>
        <a href="#">Store</a>
        <a href="#">Mac</a>
        <a href="#">iPad</a>
        <a href="#">iPhone</a>
        <a href="#">Watch</a>
        <a href="#">Vision</a>
        <a href="#">AirPods</a>
        <a href="#">TV & Home</a>
        <a href="#">Entertainment</a>
        <a href="#">Accessories</a>
        <a href="#">Support</a>
    </nav>
    <div>🔍 🛒</div>
</header>

<section class="hero">
    <h1>MacBook Neo</h1>
    <p>Amazing Mac. Surprising price.</p>
    <a href="#" class="btn primary">Learn more</a>
    <a href="#" class="btn outline">Buy</a>
</section>

<section class="product">
    <img src="https://via.placeholder.com/420x260" alt="MacBook Neo">
</section>

<footer>
    © 2026 Apple
</footer>

</body>
</html>
